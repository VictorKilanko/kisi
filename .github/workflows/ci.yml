name: CI

# Vercel builds and deploys on push via its Git integration, but it does NOT
# run lint, typecheck or tests. This workflow is the quality gate — without
# it, nothing verifies the code before it goes live.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # Catches build-time failures (content integrity assertions, bad
      # imports) before Vercel deploys them.
      - name: Build
        run: npm run build
